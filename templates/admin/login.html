<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Kirish — ATNALTIK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d0d0d;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:40px;width:100%;max-width:380px}
.login-logo{text-align:center;font-size:18px;font-weight:700;color:#e63946;letter-spacing:.1em;margin-bottom:8px}
.login-sub{text-align:center;color:#666;font-size:12px;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.form-input{width:100%;background:rgba(255,255,255,.05);border:1px solid #333;border-radius:6px;padding:10px 12px;color:#f0f0f0;font-size:13px;outline:none}
.form-input:focus{border-color:#e63946}
.btn-submit{width:100%;background:#e63946;border:none;border-radius:6px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-submit:hover{background:#c62828}
.error{background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.3);color:#ef9a9a;padding:10px;border-radius:6px;font-size:12px;margin-bottom:16px}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">ATNALTIK DUBBING</div>
  <div class="login-sub">Admin Panel</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Username / Email</label>
      <input class="form-input" type="text" name="username" placeholder="admin@atnaltik.uz" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Parol</label>
      <input class="form-input" type="password" name="password" placeholder="Parol" required>
    </div>
    <button type="submit" class="btn-submit">Kirish</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:11px;color:#444">
    Default: admin@atnaltik.uz / admin123
  </p>
</div>
</body>
</html>
